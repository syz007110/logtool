user  www-data;
worker_processes auto;
error_log  /var/log/nginx/error.log  crit;
pid        /run/nginx.pid;
worker_rlimit_nofile 51200;

events
    {
        use epoll;
        worker_connections 51200;
        multi_accept on;
    }

http
    {
        include       mime.types;
		#include luawaf.conf;

		#include proxy.conf;
        #lua_package_path "/www/server/nginx/lib/lua/?.lua;;";

        default_type  application/octet-stream;

        server_names_hash_bucket_size 512;
        client_header_buffer_size 32k;
        large_client_header_buffers 4 32k;
        client_max_body_size 50m;

        sendfile   on;
        tcp_nopush on;

        keepalive_timeout 60;

        tcp_nodelay on;

        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 64k;
        fastcgi_buffers 4 64k;
        fastcgi_busy_buffers_size 128k;
        fastcgi_temp_file_write_size 256k;
		fastcgi_intercept_errors on;

        gzip on;
        gzip_min_length  1k;
        gzip_buffers     4 16k;
        gzip_http_version 1.1;
        gzip_comp_level 5;
        gzip_types     text/plain application/javascript application/x-javascript text/javascript text/css application/xml application/json image/jpeg image/gif image/png font/ttf font/otf image/svg+xml application/xml+rss text/x-js;
        gzip_vary on;
        gzip_proxied   expired no-cache no-store private auth;
        gzip_disable   "MSIE [1-6]\.";

        limit_conn_zone $binary_remote_addr zone=perip:10m;
		limit_conn_zone $server_name zone=perserver:10m;

        server_tokens off;
        access_log off;

# LogTool Nginx 配置示例
# 
# 使用方法:
#   1. 复制此文件到 /etc/nginx/sites-available/logtool
#   2. 修改 server_name 和路径
#   3. 创建软链接: sudo ln -s /etc/nginx/sites-available/logtool /etc/nginx/sites-enabled/
#   4. 测试配置: sudo nginx -t
#   5. 重载 Nginx: sudo systemctl reload nginx

# HTTP 服务器配置
# 注意：server_name 可以使用域名或 IP 地址
# - 有域名：server_name example.com;
# - 只有IP：server_name 192.168.1.100; 或直接使用 default_server
# - 允许所有访问：server_name _; （不推荐生产环境）

    # 移动设备检测 - 定义移动设备的 User-Agent 模式
map $http_user_agent $is_mobile {
    default 0;
    ~*android|webos|iphone|ipad|ipod|blackberry|iemobile|opera\smini|mobile|palm|windows\sphone 1;
    ~*Mobile|Mobile|MOBILE 1;
}
server {
    listen 80;
    server_name 47.98.156.69;  # 使用下划线表示接受所有域名/IP访问，或者改为你的域名/IP（如：192.168.1.100）
    
    # 日志配置
    access_log /var/log/nginx/logtool-access.log;
    error_log /var/log/nginx/logtool-error.log;
    # 前端静态文件目录（桌面端）
    root /www/server/logtool/dist-web;
    index index.html;

    # -------- 缓存策略 --------
    # HTML / Service Worker：no-cache（每次协商校验，保证发版可更新）
    # 带 content-hash 的 js/css/img/fonts：长缓存 + immutable
    # 注意：用 ^~ 前缀匹配，避免被下方 /m/ SPA location 抢先吞掉

    # 桌面端入口与 SW
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location = /service-worker.js {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location = /manifest.json {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # 移动端入口与 SW
    location = /m/index.html {
        alias /www/server/logtool/dist-mobile/index.html;
        add_header Cache-Control "no-cache" always;
    }

    location = /m/service-worker.js {
        alias /www/server/logtool/dist-mobile/service-worker.js;
        add_header Cache-Control "no-cache" always;
    }

    location = /m/manifest.json {
        alias /www/server/logtool/dist-mobile/manifest.json;
        add_header Cache-Control "no-cache" always;
    }

    # 桌面端 hashed 静态资源（长缓存）
    location ^~ /js/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    location ^~ /css/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    location ^~ /img/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    location ^~ /fonts/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    location ^~ /instruments/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # 移动端 hashed 静态资源（长缓存；必须在 ^~ /m/ 之前，且前缀更长）
    location ^~ /m/js/ {
        alias /www/server/logtool/dist-mobile/js/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        access_log off;
    }

    location ^~ /m/css/ {
        alias /www/server/logtool/dist-mobile/css/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        access_log off;
    }

    location ^~ /m/img/ {
        alias /www/server/logtool/dist-mobile/img/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        access_log off;
    }

    location ^~ /m/fonts/ {
        alias /www/server/logtool/dist-mobile/fonts/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        access_log off;
    }

    location ^~ /m/instruments/ {
        alias /www/server/logtool/dist-mobile/instruments/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        access_log off;
    }

    # 其他图片/字体兜底（不含 .js，避免误伤 service-worker.js）
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        access_log off;
        try_files $uri =404;
    }

    # 后端 API 代理 - 移动端和桌面端共用同一个 API
    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # 标准代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲设置
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 健康检查接口代理（不受速率限制，无需认证）
    location /health {
        proxy_pass http://localhost:3000/health;
        proxy_http_version 1.1;
        
        # 标准代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        
        # 缓冲设置
        proxy_buffering off;
    }

    # WebSocket 支持（如果需要独立路径）
    location /ws {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 特殊超时设置
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # 移动端路径 - 如果已经是移动端路径，正常处理（避免循环重定向）
    # 移动端路径重写：/m 及其子路径都回退到移动端单页入口
    location = /m {
        return 301 /m/;
    }

    # 移动端 SPA（入口 HTML 已在上方单独 no-cache；此处覆盖路由回退）
    location ^~ /m/ {
        alias /www/server/logtool/dist-mobile/;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /m/index.html;
    }

    # 主要入口页面 - 移动设备访问时自动重定向到移动端
    # 只重定向入口页面，其他页面由前端 Vue Router 处理
    location = / {
        add_header Cache-Control "no-cache" always;
        if ($is_mobile) {
            return 301 /m;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /login {
        add_header Cache-Control "no-cache" always;
        if ($is_mobile) {
            return 301 /m/login;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /register {
        add_header Cache-Control "no-cache" always;
        if ($is_mobile) {
            return 301 /m/login;
        }
        try_files $uri $uri/ /index.html;
    }

    # 桌面端 SPA 路由回退（hash 静态资源已由上方 ^~ /js/ 等处理）
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    # 文件上传大小限制（500MB）- 覆盖 http 块的 50m 设置
    client_max_body_size 500M;
    
    # 请求体缓冲区大小
    client_body_buffer_size 128k;
    
    # 超时设置
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # 注意：gzip 压缩已在 http 块配置，此处无需重复配置
    # server 块会自动继承 http 块的 gzip 设置
}
# /etc/nginx/conf.d/ragflow.conf
server {
	listen 8088;
	server_name 47.98.156.69;

	# 允许较大上传（按需调大）
	client_max_body_size 100m;

	location / {
	proxy_pass http://10.88.0.2:80;
	proxy_http_version 1.1;

	proxy_set_header Host $host;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;

	# websocket / keep-alive 兼容
	proxy_set_header Upgrade $http_upgrade;
	proxy_set_header Connection "upgrade";

	proxy_connect_timeout 60s;
	proxy_send_timeout 300s;
	proxy_read_timeout 300s;
}
}

}
