name: Agent Guardrails

on:
  pull_request:
    branches: ["*"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend syntax check
        run: node --check backend/src/app.js
