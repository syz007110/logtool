# LogTool Nginx 配置示例
# 
# 使用方法:
#   1. 复制此文件到 /etc/nginx/sites-available/logtool
#   2. 修改 server_name 和路径
#   3. 创建软链接: sudo ln -s /etc/nginx/sites-available/logtool /etc/nginx/sites-enabled/
#   4. 测试配置: sudo nginx -t
#   5. 重载 Nginx: sudo systemctl reload nginx

# HTTP 服务器配置
# 注意：server_name 可以使用域名或 IP 地址
# - 有域名：server_name example.com;
# - 只有IP：server_name 192.168.1.100; 或直接使用 default_server
# - 允许所有访问：server_name _; （不推荐生产环境）
server {
    listen 80;
    server_name _;  # 使用下划线表示接受所有域名/IP访问，或者改为你的域名/IP（如：192.168.1.100）
    
    # 日志配置
    access_log /var/log/nginx/logtool-access.log;
    error_log /var/log/nginx/logtool-error.log;

    # 前端静态文件目录
    root /var/www/logtool;
    index index.html;

    # 移动设备检测 - 定义移动设备的 User-Agent 模式
    map $http_user_agent $is_mobile {
        default 0;
        ~*android|webos|iphone|ipad|ipod|blackberry|iemobile|opera\smini|mobile|palm|windows\sphone 1;
        ~*Mobile|Mobile|MOBILE 1;
    }

    # 静态资源缓存配置（1年）- 最高优先级，优先匹配
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        # 静态资源不需要重定向，直接返回
        try_files $uri =404;
    }

    # 后端 API 代理 - 移动端和桌面端共用同一个 API
    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # 标准代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲设置
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # WebSocket 支持（如果需要独立路径）
    location /ws {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 特殊超时设置
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # 移动端路径 - 如果已经是移动端路径，正常处理（避免循环重定向）
    location ^~ /m {
        try_files $uri $uri/ /index.html;
    }

    # 主要入口页面 - 移动设备访问时自动重定向到移动端
    # 只重定向入口页面，其他页面由前端 Vue Router 处理
    location = / {
        if ($is_mobile) {
            return 301 /m;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /login {
        if ($is_mobile) {
            return 301 /m/login;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /register {
        if ($is_mobile) {
            return 301 /m/login;
        }
        try_files $uri $uri/ /index.html;
    }

    # 桌面端路径通用处理 - 所有路由都回退到 index.html 以支持 Vue Router
    # 注意：Vue Router 使用 history mode，需要将所有不存在的路由都回退到 index.html
    location / {
        # 可选：如果希望所有桌面端路径都重定向到移动端，取消下面的注释
        # if ($is_mobile) {
        #     return 301 /m;
        # }
        # 关键：try_files 确保所有前端路由都能正确加载 index.html
        try_files $uri $uri/ /index.html;
    }

    # 文件上传大小限制（500MB）
    client_max_body_size 500M;
    
    # 请求体缓冲区大小
    client_body_buffer_size 128k;
    
    # 超时设置
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    gzip_comp_level 6;
}

